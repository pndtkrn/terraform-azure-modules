# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  name: Terraform

stages:
- stage: Plan
  jobs:
  - job: TerraformPlan
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: "Terraform Install"
      inputs:
        terraformVersion: '1.9.5'

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/sandbox'
        backendServiceArm: 'terraform'
        backendAzureRmResourceGroupName: 'rg-sandbox'
        backendAzureRmStorageAccountName: 'stsandbox8754637487'
        backendAzureRmContainerName: 'terraformbackend'
        backendAzureRmKey: 'sandbox/terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/sandbox'
        environmentServiceNameAzureRM: 'terraform'

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '-auto-approve'
        environmentServiceNameAzureRM: 'terraform'
