# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  name: Terraform

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.9.5'

- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'terraform'
    backendAzureRmResourceGroupName: 'rg-sandbox'
    backendAzureRmStorageAccountName: 'stsandbox8754637487'
    backendAzureRmContainerName: 'terraformbackend'
    backendAzureRmKey: 'sandbox/terraform.tfstate'

- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'terraform'
